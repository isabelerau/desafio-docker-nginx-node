services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    image: isabelerau/nginx:prod
    container_name: nginx
    networks:
      - isanet
    ports:
      - '8080:80'
    depends_on:
      - app

  app:
    build:
      context: ./node
    container_name: app
    entrypoint: dockerize -wait tcp://db:3306 -timeout 20s node index.js
    networks:
      - isanet
    volumes:
      - ./node:/usr/src/app
      - /usr/src/app/node_modules
    tty: true
    ports:
      - '3000:3000'
    depends_on:
      - db

  db:
    image: mysql:8.0
    command: --innodb-use-native-aio=0
    container_name: db
    restart: always
    tty: true
    volumes:
      - ./mysql:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=nodedb
      - MYSQL_ROOT_PASSWORD=root
    networks:
      - isanet

networks:
  isanet:
    driver: bridge
